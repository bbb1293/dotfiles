# ═══════════════════════════════════════════════════════════
#  ~/.tmux.conf
#  External deps: fzf, bat, tmux-thumbs (brew install tmux-thumbs)
#  Plugin manager: TPM (see install steps below)
#  After install:  start tmux, press   prefix + I   to fetch plugins
# ═══════════════════════════════════════════════════════════

# ─── Prefix ───────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ─── General ──────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ─── Splits (cwd-aware) ───────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── Pane navigation ──────────────────────────────────────
# Ctrl+h/j/k/l is handled by vim-tmux-navigator below (no prefix needed)

# Pane resize (repeatable: hold Ctrl+a, mash H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane layouts
bind = select-layout even-horizontal
bind + select-layout even-vertical

# Pane title (prefix T → name this pane, shown in the top border)
bind T command-prompt -p "Pane title:" "select-pane -T '%%'"
set -g pane-border-status top
set -g pane-border-format " #P #{?pane_title,[#{pane_title}] ,}#{pane_current_command} "

# ─── Quality of life ──────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind C-a last-window
bind Tab switch-client -l

# ─── Copy mode (vi keys; tmux-yank handles clipboard) ─────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# ─── Background-window alerts (* when Claude needs attention) ──
# Catches both: explicit bell (Claude rings for input) and silence (idle).
set -g monitor-bell on            # bell character → flag
set -g bell-action other          # report bells from non-current windows
set -g visual-bell off            # silent — just flag, don't propagate beep
setw -g monitor-silence 4         # 4s silence → flag (Claude waiting)
setw -g window-status-bell-style     "fg=red,bold"
setw -g window-status-activity-style "fg=yellow,bold"

# Patch tmux-sessionx so its window list also shows * for alerted windows.
# Idempotent: safe to run every reload; re-applies after TPM updates.
run-shell ~/dotfiles/scripts/patch-sessionx.sh

# ─── Status bar ───────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-interval 2
set -g status-left  "#[fg=green,bold] #S "
set -g status-right "#[fg=red,bold]#(~/dotfiles/scripts/tmux-other-alerts.sh)#[fg=cyan]%a %Y-%m-%d #[fg=yellow]%H:%M "
set -g status-left-length 30
set -g status-right-length 120
setw -g window-status-current-style "fg=black,bg=cyan,bold"
# Append * to window names when bell or silence flag is set (clears on visit)
setw -g window-status-current-format " #I:#W#{?window_bell_flag,*,#{?window_silence_flag,*,}} "
setw -g window-status-format         " #I:#W#{?window_bell_flag,*,#{?window_silence_flag,*,}} "

# ═══════════════════════════════════════════════════════════
#  Plugins (TPM)  — keep `run '~/.tmux/plugins/tpm/tpm'` LAST
# ═══════════════════════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'fcsonline/tmux-thumbs'

# resurrect: also restore nvim sessions + pane contents
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# continuum: auto-save every 15 min, auto-restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# sessionx: prefix + o, with previews + window list
set -g @sessionx-bind 'o'
set -g @sessionx-window-mode 'on'
set -g @sessionx-preview-enabled 'true'
# Uncomment once `brew install zoxide` is done:
# set -g @sessionx-zoxide-mode 'on'

# tmux-fzf: prefix + F (default — kept for clarity)
set-environment -g TMUX_FZF_LAUNCH_KEY "F"

# tmux-thumbs: prefix + Space, copy match to clipboard
set -g @thumbs-key Space
set -g @thumbs-command 'tmux set-buffer -w -- {} && tmux display-message "Copied: {}"'

run '~/.tmux/plugins/tpm/tpm'
